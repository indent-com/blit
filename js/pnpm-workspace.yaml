packages:
  - core
  - react
  - solid
  - ui
  - website

overrides:
  yaml: ^2.8.3
  # GHSA-fx2h-pf6j-xcff / GHSA-v6wh-96g9-6wx3: Windows server.fs.deny bypass +
  # launch-editor UNC hash disclosure in vite <7.3.5 / <8.0.16.
  "vite@<7.3.5": ">=7.3.5 <8"
  "vite@<8.0.16": ">=8.0.16 <9"
  # GHSA-g7r4-m6w7-qqqr: path traversal in esbuild dev server (servedir)
  # >=0.27.3, <0.28.1 on Windows. Pulled transitively via vite/vitest.
  esbuild: ">=0.28.1"
  # GHSA-hm92-r4w5-c3mj / GHSA-vmh5-mc38-953g / GHSA-pr7r-676h-xcf6:
  # SOCKS5 proxy pool reuse / TLS bypass / shared cache disclosure in
  # undici <7.28.0. Pulled transitively (e.g. via @astrojs/*).
  undici: ">=7.28.0"

onlyBuiltDependencies:
  - esbuild
  - sharp

allowBuilds:
  esbuild: true
  sharp: true
