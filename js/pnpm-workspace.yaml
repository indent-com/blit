packages:
  - core
  - react
  - solid
  - ui
  - website

overrides:
  yaml: ^2.8.3
  # GHSA-fx2h-pf6j-xcff / GHSA-v6wh-96g9-6wx3: Windows server.fs.deny bypass +
  # launch-editor UNC hash disclosure in vite <7.3.5 / <8.0.16.
  "vite@<7.3.5": ">=7.3.5 <8"
  "vite@<8.0.16": ">=8.0.16 <9"
  # GHSA-g7r4-m6w7-qqqr: path traversal in esbuild dev server (servedir)
  # >=0.27.3, <0.28.1 on Windows. Pulled transitively via vite/vitest.
  esbuild: ">=0.28.1"
  # GHSA-hm92-r4w5-c3mj / GHSA-vmh5-mc38-953g / GHSA-pr7r-676h-xcf6:
  # SOCKS5 proxy pool reuse / TLS bypass / shared cache disclosure in
  # undici <7.28.0. Pulled transitively (e.g. via jsdom). Keep within the
  # 7.x line — jsdom@29 imports `undici/lib/handler/wrap-handler.js`,
  # which only exists in undici 7 (the path moved in 8.x).
  undici: "^7.28.0"
  # CVE-2026-53550: js-yaml <=4.1.1 (4.2.0 is the next patched release).
  # Pulled in transitively via astro@6.4.8 / @astrojs/internal-helpers.
  # 5.x dropped the default export, breaking Astro's
  # `import yaml from 'js-yaml'` — pin to the 4.x line until Astro adopts
  # the named-only API.
  "js-yaml": ">=4.2.0 <5"

onlyBuiltDependencies:
  - esbuild
  - sharp

allowBuilds:
  esbuild: true
  sharp: true
