version: "0.5"

processes:
  browser-wasm:
    command: cargo watch -w browser/src -w remote/src -s "./bin/build-browser"
    availability:
      restart: on_failure
      max_restarts: 0
    readiness_probe:
      exec:
        command: test -f web-app/dist/index.html
      initial_delay_seconds: 2
      period_seconds: 1
      failure_threshold: 120

  web-app:
    command: cargo watch -w web-app/src -w web-app/index.html -w react/src -s "(cd web-app && npm run build)"
    depends_on:
      browser-wasm:
        condition: process_healthy
    availability:
      restart: on_failure
      max_restarts: 0

  server:
    command: cargo watch -w server/src -w remote/src -w wezterm-driver/src -x "run -p blit-server --release -- --socket /tmp/blit-dev.sock"
    availability:
      restart: on_failure
      max_restarts: 0

  gateway:
    command: cargo watch -w gateway/src -w web-app/dist/index.html -x "run -p blit-gateway --release"
    environment:
      - BLIT_PASS=${BLIT_PASS:-dev}
      - BLIT_SOCK=/tmp/blit-dev.sock
    depends_on:
      browser-wasm:
        condition: process_healthy
      server:
        condition: process_started
    availability:
      restart: on_failure
      max_restarts: 0
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 3264
        path: /
      initial_delay_seconds: 2
      period_seconds: 2
      failure_threshold: 10
