version: "0.5"

processes:
  browser-wasm:
    command: cargo watch -w browser/src -w remote/src -s "./bin/build-browser"
    availability:
      restart: always
    readiness_probe:
      exec:
        command: test -f web-app/dist/index.html
      initial_delay_seconds: 5
      period_seconds: 2
      failure_threshold: 300

  web-app:
    command: cargo watch -w web-app/src -w web-app/index.html -w react/src -s "(cd web-app && npm run build)"
    depends_on:
      browser-wasm:
        condition: process_healthy
    availability:
      restart: always

  server:
    command: cargo build -p blit-server --release && ./target/release/blit-server --socket /tmp/blit-dev.sock
    availability:
      restart: always

  gateway:
    command: cargo watch -w gateway/src -w webserver/src -w web-app/dist/index.html -x "run -p blit-gateway --release"
    environment:
      - BLIT_PASS=${BLIT_PASS:-dev}
      - BLIT_SOCK=/tmp/blit-dev.sock
      - BLIT_QUIC=1
    depends_on:
      browser-wasm:
        condition: process_healthy
      server:
        condition: process_started
    availability:
      restart: always
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 3264
        path: /
      initial_delay_seconds: 5
      period_seconds: 2
      failure_threshold: 300
