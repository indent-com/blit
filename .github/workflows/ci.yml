name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  nix-syntax:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Parse all Nix files
        run: find . -name '*.nix' -exec nix-instantiate --parse {} + > /dev/null

  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/lint

  dev-check:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop --command ./bin/dev-check

  test:
    strategy:
      matrix:
        include:
          - runner: blacksmith-8vcpu-ubuntu-2404
          - runner: blacksmith-6vcpu-macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/tests

  e2e:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

  coverage:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run tests with coverage
        run: ./bin/coverage
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-report/html/
          retention-days: 30
      - name: Post coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage-summary.txt

  build-packages:
    uses: ./.github/workflows/_build-packages.yml

  build-windows:
    uses: ./.github/workflows/_build-windows.yml
