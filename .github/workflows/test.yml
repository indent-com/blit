name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix run .#lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix run .#tests

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build WASM assets
        run: |
          nix build .#blit-server
          nix build .#blit-gateway
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies and Playwright
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Copy binaries from nix store
        run: |
          mkdir -p target/debug
          cp "$(nix build .#blit-server --print-out-paths)/bin/blit-server" target/debug/
          cp "$(nix build .#blit-gateway --print-out-paths)/bin/blit-gateway" target/debug/
          chmod +x target/debug/blit-server target/debug/blit-gateway
      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

  build-debs:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build debs
        run: |
          for pkg in blit-server-deb blit-cli-deb blit-gateway-deb; do
            echo "=== $pkg ==="
            nix build .#"$pkg"
          done
