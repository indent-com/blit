name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  verify-tag:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Verify tag signature via GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          state=$(gh api "repos/${repo}/git/ref/tags/${tag}" \
            --jq '.object.sha' \
            | xargs -I{} gh api "repos/${repo}/git/tags/{}" \
              --jq '.verification.verified')
          if [ "$state" != "true" ]; then
            echo "::error::Tag ${tag} is not signed by a verified identity"
            exit 1
          fi

  build-packages:
    needs: [verify-tag]
    uses: ./.github/workflows/_build-packages.yml
    with:
      upload: true

  build-windows:
    needs: [verify-tag]
    uses: ./.github/workflows/_build-windows.yml
    with:
      upload: true

  release:
    needs: [build-packages, build-windows]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: debs

      - uses: actions/download-artifact@v4
        with:
          pattern: tarballs-*
          merge-multiple: true
          path: tarballs

      - uses: actions/download-artifact@v4
        with:
          name: windows-x86_64
          path: windows

      - name: List artifacts
        run: |
          ls -lh debs/
          ls -lh tarballs/
          ls -lh windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            debs/*.deb
            tarballs/*.tar.gz
            windows/*.zip
          generate_release_notes: true

  publish-crates:
    needs: [release]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/publish-crates

  publish-npm:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/publish-npm-packages --provenance --access public

  update-homebrew:
    needs: [release]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: indent-com/homebrew-tap
          event-type: update
          client-payload: '{"version": "${{ github.ref_name }}"}'

  apt-repo:
    needs: [build-packages, build-windows]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: debs

      - uses: actions/download-artifact@v4
        with:
          pattern: tarballs-*
          merge-multiple: true
          path: tarballs

      - uses: actions/download-artifact@v4
        with:
          name: windows-x86_64
          path: windows

      - name: Import GPG key
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build APT repo
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev

          mkdir -p repo/pool repo/dists/stable/main/binary-amd64
          mkdir -p repo/dists/stable/main/binary-arm64
          cp debs/*.deb repo/pool/
          cp .github/blit.gpg repo/blit.gpg

          # Static binaries for direct download
          mkdir -p repo/bin
          for f in tarballs/*.tar.gz; do
            cp "$f" repo/bin/
          done
          for f in windows/*.zip; do
            cp "$f" repo/bin/
          done

          # Write version to /latest
          echo "${GITHUB_REF_NAME#v}" > repo/latest

          cp install.sh repo/index.html
          cp install.ps1 repo/install.ps1
          cp SKILL.md repo/SKILL.md

          cd repo
          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool > dists/stable/main/binary-arm64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-arm64/Packages

          cat > dists/stable/Release <<'RELEASE'
          Origin: blit
          Label: blit
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          RELEASE
          sed -i 's/^          //' dists/stable/Release

          apt-ftparchive release dists/stable >> dists/stable/Release
          gpg --batch --yes --armor --detach-sign --output dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --armor --clearsign --output dists/stable/InRelease dists/stable/Release

      - uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy-pages:
    needs: [apt-repo]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/deploy-pages@v4
